apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/takhirdev/argocd-helm-demo
    targetRevision: HEAD
    path: helm/myapp
    helm:
      valueFiles:
        - ../../values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
